version: '3.8'

services:
  iqa-app:
    build: .
    container_name: iqa-app
    ports:
      - "4001:80"
    restart: unless-stopped
    networks:
      - coolify
    labels:
      - "traefik.enable=true"
      # ปิดการบังคับ Redirect จาก HTTP ไป HTTPS (เพื่อให้คุยกับ Cloudflare ได้)
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=http"

networks:
  coolify:
    external: true
